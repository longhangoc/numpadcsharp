name: .NET Build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore dependencies
        run: dotnet restore NumpadOverlay.csproj

      - name: Build solution
        run: dotnet build NumpadOverlay.csproj --configuration Release --no-restore

      - name: Publish self-contained single-file app
        run: |
          dotnet publish NumpadOverlay.csproj \
            --configuration Release \
            --runtime win-x64 \
            --self-contained true \
            -p:PublishSingleFile=true \
            -p:PublishTrimmed=false \
            -o ${{ github.workspace }}/publish

      - name: Upload publish artifact
        uses: actions/upload-artifact@v4
        with:
          name: numpad-overlay-publish
          path: publish
